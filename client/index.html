<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://res.cloudinary.com/dgcgovg0x/image/upload/v1782108981/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verve Innovation</title>
    <meta property="og:image" content="/OG-IMAGE.svg" />
    <meta name="twitter:image" content="/OG-IMAGE.svg" />
    <!-- Fonts loaded via CSS -->
    <!-- Anti-flash script for dark/light theme -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('verve-theme');
          if (!theme) {
            theme = 'light'; // default to light
            localStorage.setItem('verve-theme', theme);
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
