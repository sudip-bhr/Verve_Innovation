<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/OG-IMAGE.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verve Innovation | Digital Design Agency</title>
    <meta name="title" content="Verve Innovation | Digital Design Agency" />
    <meta name="description" content="We design and build digital experiences that transform brands. Explore our selected works and services." />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://verve-innovation.vercel.app/" />
    <meta property="og:title" content="Verve Innovation | Digital Design Agency" />
    <meta property="og:description" content="We design and build digital experiences that transform brands. Explore our selected works and services." />
    <meta property="og:image" content="https://verve-innovation.vercel.app/OG-IMAGE.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://verve-innovation.vercel.app/" />
    <meta name="twitter:title" content="Verve Innovation | Digital Design Agency" />
    <meta name="twitter:description" content="We design and build digital experiences that transform brands. Explore our selected works and services." />
    <meta name="twitter:image" content="https://verve-innovation.vercel.app/OG-IMAGE.png" />
    <!-- Fonts loaded via CSS -->
    <!-- Anti-flash script for dark/light theme -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('verve-theme');
          if (!theme) {
            theme = 'light'; // default to light
            localStorage.setItem('verve-theme', theme);
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
