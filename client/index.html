<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verve Innovation</title>
    <!-- Font Preloads -->
    <link rel="preload" href="/fonts/space-grotesk-700.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/libre-caslon-text-italic.woff2" as="font" type="font/woff2" crossorigin>
    <!-- Anti-flash script for dark/light theme -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('verve-theme');
          if (!theme) {
            theme = 'dark'; // default to dark
            localStorage.setItem('verve-theme', theme);
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
